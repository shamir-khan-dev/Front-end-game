<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Repeller — RPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="new.css">
</head>
<body>

    <!-- Animated background particles -->
    <div class="bg-scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="particles">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-wrap">

        <!-- Title Banner -->
        <div class="title-banner">
            <div class="title-flame">🔥</div>
            <h1 class="main-title">Dragon Repeller</h1>
            <div class="title-flame">🔥</div>
        </div>

        <div id="game">

            <!-- Player Stats Bar -->
            <div class="hud-bar">
                <div class="hud-stat" id="hud-hp">
                    <div class="hud-icon">❤️</div>
                    <div class="hud-info">
                        <span class="hud-label">Health</span>
                        <div class="hud-bar-wrap">
                            <div class="hud-fill hp-fill" id="healthBarFill" style="width:100%"></div>
                        </div>
                        <span class="hud-val" id="healthText">100</span>
                    </div>
                </div>

                <div class="hud-center">
                    <div class="gold-badge">
                        <span class="gold-icon">✦</span>
                        <span id="goldText">50</span>
                        <span class="gold-label">Gold</span>
                    </div>
                    <div class="xp-badge">
                        <span class="xp-icon">⚡</span>
                        <span id="xpText">0</span>
                        <span class="xp-label">XP</span>
                    </div>
                </div>

                <div class="hud-stat hud-stat-right" id="hud-mp">
                    <div class="hud-info">
                        <span class="hud-label right-label">Equipped</span>
                        <span class="equipped-weapon" id="equippedWeapon">🥢 Stick</span>
                    </div>
                    <div class="hud-icon">⚔️</div>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider"><span>⸻⸻ Realm of Auryn ⸻⸻</span></div>

            <!-- Monster encounter panel -->
            <div id="monsterStats" class="monster-encounter">
                <div class="monster-info">
                    <div class="monster-skull">☠️</div>
                    <div class="monster-details">
                        <span class="monster-label">YOU FACE</span>
                        <span id="monsterName" class="monster-name-text">the Dragon</span>
                    </div>
                </div>
                <div class="monster-hp-section">
                    <div class="monster-hp-label">
                        <span>Vitality</span>
                        <span id="monsterHealth" class="monster-hp-num">300</span>
                    </div>
                    <div class="monster-bar-track">
                        <div class="monster-bar-fill" id="monsterHealthBarFill" style="width:100%"></div>
                        <div class="monster-bar-shine"></div>
                    </div>
                </div>
            </div>

            <!-- Game Narrative Log -->
            <div class="log-container">
                <div class="log-header">
                    <span class="log-dot"></span>
                    <span class="log-title">Chronicle</span>
                    <span class="log-dot"></span>
                </div>
                <div id="text" class="log-text">
                    You stand in the cobblestone town square. The torches flicker. A dragon lurks beyond the mountains. Where do you venture, hero?
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="controls" class="controls">
                <button id="button1" class="action-btn btn-explore">Go to Store</button>
                <button id="button2" class="action-btn btn-explore">Go to Cave</button>
                <button id="button3" class="action-btn btn-danger">Fight Dragon</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
